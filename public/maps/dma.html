<script src="https://cdn.jsdelivr.net/npm/d3@7.9.0/dist/d3.min.js"></script><script src="https://cdn.jsdelivr.net/npm/markmap-view@0.18.12/dist/browser/index.js"></script><script src="https://cdn.jsdelivr.net/npm/markmap-toolbar@0.18.12/dist/index.js"></script><script>(()=>{setTimeout(()=>{const{markmap:S,mm:Q}=window,$=new S.Toolbar;$.attach(Q);const I=$.render();I.setAttribute("style","position:absolute;bottom:20px;right:20px"),document.body.append(I)})})()</script><script>((l,U,M,R)=>{const N=l();window.mm=N.Markmap.create("svg#mindmap",(U||N.deriveOptions)(R),M),window.matchMedia("(prefers-color-scheme: dark)").matches&&document.documentElement.classList.add("markmap-dark")})(()=>window.markmap,null,{"content":"Dynamic Memory Allocation (DMA)","children":[{"content":"Latar Belakang &amp; Kebutuhan","children":[{"content":"<strong>Alasan Penggunaan</strong>: Terkadang jumlah kebutuhan memori tidak diketahui pasti saat kita menulis program.","children":[],"payload":{"tag":"li","lines":"3,4"}},{"content":"<strong>Kekuatan Pointer</strong>: DMA adalah kekuatan utama dari penggunaan pointer dalam membentuk berbagai struktur data.","children":[],"payload":{"tag":"li","lines":"4,5"}},{"content":"<strong>Fleksibilitas</strong>: Ruang memori bisa dialokasikan di dalam sebuah fungsi dan dibebaskan di fungsi lain secara fleksibel.","children":[],"payload":{"tag":"li","lines":"5,7"}}],"payload":{"tag":"h2","lines":"2,3"}},{"content":"Konsep Dasar DMA","children":[{"content":"<strong>Run-Time Allocation</strong>: Ruang memori untuk <em>dynamic variables</em> dialokasikan secara dinamis pada saat program dieksekusi (<em>run time</em>).","children":[],"payload":{"tag":"li","lines":"8,9"}},{"content":"<strong>Kontrol Manual</strong>: Variabel dinamis harus dibuat dan dihancurkan secara manual oleh programmer. Compiler C tidak akan membebaskan memori tersebut secara otomatis.","children":[],"payload":{"tag":"li","lines":"9,10"}},{"content":"<strong>Akses Eksklusif</strong>: Variabel dinamis tidak memiliki nama variabelnya sendiri, sehingga <em>hanya</em> bisa diakses melalui pointer.","children":[],"payload":{"tag":"li","lines":"10,11"}},{"content":"<strong>Library Wajib</strong>: Fungsi <code>malloc</code>, <code>free</code>, dan nilai <code>NULL</code> berada di dalam file header <code>&lt;stdlib.h&gt;</code> yang wajib di-<em>include</em>.","children":[],"payload":{"tag":"li","lines":"11,13"}}],"payload":{"tag":"h2","lines":"7,8"}},{"content":"Pengalokasian: <code>malloc()</code> &amp; <code>sizeof()</code>","children":[{"content":"<strong><code>sizeof()</code></strong>","children":[{"content":"<strong>Fungsi</strong>: Mendapatkan ukuran pasti (dalam hitungan byte) dari sebuah obyek atau tipe data.","children":[],"payload":{"tag":"li","lines":"15,16"}},{"content":"<strong>Contoh</strong>: <code>sizeof(int)</code> biasanya bernilai 4 byte, <code>sizeof(char)</code> 1 byte.","children":[],"payload":{"tag":"li","lines":"16,17"}}],"payload":{"tag":"li","lines":"14,17"}},{"content":"<strong><code>malloc()</code></strong>","children":[{"content":"<strong>Fungsi</strong>: Mengalokasikan <em>storage space</em> (ruang memori) baru sesuai ukuran yang diminta.","children":[],"payload":{"tag":"li","lines":"18,19"}},{"content":"<strong>Sintaks</strong>: <code>p = (int*) malloc(sizeof(int));</code>","children":[],"payload":{"tag":"li","lines":"19,20"}},{"content":"<strong>Type Casting <code>(int*)</code></strong>: Berfungsi sebagai petunjuk (<em>hint</em>) untuk compiler bahwa sel memori yang baru dibuat itu akan ditunjuk oleh pointer bertipe integer.","children":[],"payload":{"tag":"li","lines":"20,22"}}],"payload":{"tag":"li","lines":"17,22"}}],"payload":{"tag":"h2","lines":"13,14"}},{"content":"Pembebasan: <code>free()</code> &amp; <code>NULL</code>","children":[{"content":"<strong><code>free()</code></strong>","children":[{"content":"<strong>Fungsi</strong>: Membebaskan sel memori atau variabel dinamis yang sedang ditunjuk oleh suatu pointer.","children":[],"payload":{"tag":"li","lines":"24,25"}},{"content":"<strong>Sifat Mekanis</strong>: Perintah <code>free(p)</code> HANYA membebaskan memorinya, namun tidak mengubah variabel pointernya itu sendiri.","children":[],"payload":{"tag":"li","lines":"25,26"}}],"payload":{"tag":"li","lines":"23,26"}},{"content":"<strong><code>NULL</code></strong>","children":[{"content":"<strong>Masalah</strong>: Setelah memori di-<code>free</code>, pointer akan menunjuk ke alamat yang berisi nilai sampah (<em>rubbish</em>).","children":[],"payload":{"tag":"li","lines":"27,28"}},{"content":"<strong>Solusi/Praktik Baik</strong>: Selalu set <code>p = NULL;</code> sesudah <code>free(p)</code> untuk menegaskan bahwa pointer tersebut sudah tidak menunjuk ke mana-mana.","children":[],"payload":{"tag":"li","lines":"28,30"}}],"payload":{"tag":"li","lines":"26,30"}}],"payload":{"tag":"h2","lines":"22,23"}},{"content":"Array Dinamis (Dynamic Array)","children":[{"content":"<strong>Konsep</strong>: DMA memungkinkan kita membuat array yang ukurannya tidak harus dipastikan (<em>fixed</em>) pada saat program di-<em>compile</em>.","children":[],"payload":{"tag":"li","lines":"31,32"}},{"content":"<strong>Sintaks Alokasi</strong>: <code>p = (int*) malloc(sizeof(int) * size);</code> (kalikan tipe data dengan variabel jumlah ukurannya).","children":[],"payload":{"tag":"li","lines":"32,33"}},{"content":"<strong>Akses Data</strong>: Data di dalamnya tetap bisa diakses dan diisi layaknya array biasa, contohnya <code>p[i] = i;</code>.","children":[],"payload":{"tag":"li","lines":"33,35"}}],"payload":{"tag":"h2","lines":"30,31"}},{"content":"Bahaya &amp; Aturan Penting","children":[{"content":"<strong>Memory Leak (Kebocoran Memori)</strong>","children":[{"content":"Terjadi jika pointer yang menunjuk memori dinamis diubah arahnya (misal <code>p = q</code>) atau di-<code>malloc</code> ulang tanpa men-<code>free</code> memori aslinya lebih dulu.","children":[],"payload":{"tag":"li","lines":"37,38"}},{"content":"<strong>Dampak</strong>: Variabel dinamis yang asli jadi menggantung, tidak bisa diakses, dan memakan memori komputer sia-sia.","children":[],"payload":{"tag":"li","lines":"38,39"}}],"payload":{"tag":"li","lines":"36,39"}},{"content":"<strong>Invalid Pointer De-reference</strong>","children":[{"content":"Terjadi apabila kita nekat memanipulasi pointer (contoh: <code>*p = 999;</code>) padahal sel memorinya sudah dihapus/di-<code>free</code>.","children":[],"payload":{"tag":"li","lines":"40,41"}}],"payload":{"tag":"li","lines":"39,41"}},{"content":"<strong>Aturan &quot;Hanya Sekali&quot;</strong>","children":[{"content":"Bebaskan sebuah sel memori yang tidak terpakai cukup SEKALI saja.","children":[],"payload":{"tag":"li","lines":"42,43"}},{"content":"Ingat aturannya: <em>Bebaskan sel memorinya, bukan hapus setiap pointernya.</em> Jika <code>p</code> dan <code>q</code> menunjuk ke sel yang sama, jangan panggil <code>free</code> untuk keduanya.","children":[],"payload":{"tag":"li","lines":"43,44"}}],"payload":{"tag":"li","lines":"41,44"}},{"content":"<strong>Jangan Pernah Free Variabel Statis</strong>","children":[{"content":"Variabel lokal/statis (misalnya: <code>int a = 5; q = &amp;a;</code>) akan dikelola secara otomatis oleh sistem.","children":[],"payload":{"tag":"li","lines":"45,46"}},{"content":"Hanya gunakan perintah <code>free()</code> HANYA untuk memori yang sebelumnya dibuat dengan <code>malloc()</code>.","children":[],"payload":{"tag":"li","lines":"46,47"}}],"payload":{"tag":"li","lines":"44,47"}}],"payload":{"tag":"h2","lines":"35,36"}}],"payload":{"tag":"h1","lines":"0,1"}},null)</script>
